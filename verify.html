<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="style.css" rel="stylesheet">
  <title>Captcha Verify</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .captcha-box {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 10px;
    }
    .captcha {
      font-weight: bold; font-size: 24px;
      background: #eee; padding: 5px 10px;
      letter-spacing: 3px; user-select: none;
    }
    input, button {
      padding: 8px; font-size: 16px;
    }
  </style>
</head>
<body>

  <h2>Captcha Verifikation</h2>

  <div class="captcha-box">
    <div id="captcha" class="captcha"></div>
    <button onclick="generateCaptcha()">⟳</button>
  </div>

  <input type="text" id="captchaInput" placeholder="Captcha eingeben">
  <button onclick="verifyCaptcha()">Verifizieren</button>

  <p id="status"></p>

  <script>
    function generateCaptcha() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let captcha = '';
      for (let i = 0; i < 6; i++) {
        captcha += chars[Math.floor(Math.random() * chars.length)];
      }
      document.getElementById('captcha').textContent = captcha;
    }

    function verifyCaptcha() {
      const input = document.getElementById('captchaInput').value.trim().toUpperCase();
      const actual = document.getElementById('captcha').textContent;

      if (input === actual) {
        sessionStorage.setItem('verified', 'true');
        document.getElementById('status').textContent = '✅ Verifiziert!';
      } else {
        document.getElementById('status').textContent = '❌ Falsches Captcha. Neues generiert.';
        sessionStorage.setItem('verified', 'false');
        generateCaptcha();
      }
    }

    // Initial
    window.onload = () => {
      generateCaptcha();
      if (sessionStorage.getItem('verified') === 'true') {
        document.getElementById('status').textContent = '✅ Bereits verifiziert (sessionStorage)';
      }
    }
  </script>

</body>
</html>
