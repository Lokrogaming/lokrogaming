<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Universal-Umrechner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topnav">
    <a href="index.html">Home</a>
    <a href="projekte.html">Projekte</a>
    <a class="active" href="#">Umrechner</a>
    <a class="about" href="about.html">About</a>
  </div>

  <div style="margin-top: 100px; text-align: center;">
    <h1>Universal-Umrechner</h1>
    <input type="number" id="inputValue" placeholder="Wert eingeben" class="button" />

    <div class="dropdown">
      <a><select id="categorySelect" class="button">
        <option value="currency">Währung</option>
        <option value="weight">Gewicht</option>
        <option value="length">Länge</option>
        <option value="speed">Geschwindigkeit</option>
      </select></a>
    </div>

    <div class="dropdown">
      <a><select id="fromUnit" class="button"></select></a>
    </div>

    <div class="dropdown">
      <a><select id="toUnit" class="button"></select></a>
    </div>

    <br />
    <button class="button" onclick="convert()">Umrechnen</button>
    <p id="result">Ergebnis: </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
