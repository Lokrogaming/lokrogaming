<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Benchmarking System</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white">

  
  <div class="topnav">
    <a href="index.html">Home</a>
    <a href="game-library.html">Games</a>
    <a href="projekte.html">Projekte</a>
    <a class="active" href="#">Benchmark</a>
    <a class="about" href="about.html">About</a>
  </div>

  <div class="container py-5 text-center">
    <h1 class="mb-4">Browser Benchmark</h1>

    <canvas id="benchmark" width="256" height="256" class="border border-light"></canvas>
    <div id="result" class="mt-4 fs-4">Benchmark läuft...</div>

    <hr class="my-5">

    <h2>Systeminformationen</h2>
    <ul class="list-group text-start mt-3" id="sysinfo"></ul>
  </div>
  <script>
    const canvas = document.getElementById("benchmark");
    const ctx = canvas.getContext("2d");
    let frameCount = 0;
    const duration = 5000;
    const startTime = performance.now();

    function drawFrame() {
      for (let y = 0; y < canvas.height; y += 16) {
        for (let x = 0; x < canvas.width; x += 16) {
          ctx.fillStyle = `hsl(${Math.random() * 360}, 100%, 50%)`;
          ctx.fillRect(x, y, 16, 16);
        }
      }
      frameCount++;
      if (performance.now() - startTime < duration) {
        requestAnimationFrame(drawFrame);
      } else {
        const fps = (frameCount / (duration / 1000)).toFixed(2);
        document.getElementById("result").textContent = `Benchmark beendet: ${fps} FPS`;
      }
    }

    drawFrame();

    function getGPUInfo() {
      const gl = document.createElement('canvas').getContext('webgl');
      const info = gl.getExtension('WEBGL_debug_renderer_info');
      return {
        gpu: info ? gl.getParameter(info.UNMASKED_RENDERER_WEBGL) : "Nicht verfügbar",
        vendor: info ? gl.getParameter(info.UNMASKED_VENDOR_WEBGL) : "Nicht verfügbar"
      };
    }

    function detectSystem() {
      const info = [];
      const gpu = getGPUInfo();

      info.push(`Betriebssystem & Browser: ${navigator.userAgent}`);
      info.push(`Sprache: ${navigator.language}`);
      info.push(`CPU-Kerne: ${navigator.hardwareConcurrency}`);
      info.push(`GPU: ${gpu.gpu}`);
      info.push(`GPU-Hersteller: ${gpu.vendor}`);
      info.push(`Plattform: ${navigator.platform}`);

      const list = document.getElementById("sysinfo");
      info.forEach(i => {
        const li = document.createElement("li");
        li.className = "list-group-item bg-dark text-white border-secondary";
        li.textContent = i;
        list.appendChild(li);
      });
    }

    detectSystem();
  </script>
</body>
</html>
