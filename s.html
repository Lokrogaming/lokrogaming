<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Search</title>
  <style>
    #error {
      display: none;
      color: red;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="topnav">
    <a href="index.html" class="active">Home</a>
    <a href="game-library.html">Games</a>
    <a href="projekte.html">Projekte</a>
    <a href="about.html" class="about">About</a>
  </div>

  <div id="error">
    <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="Red" class="bi bi-ban" viewBox="0 0 16 16">
      <path d="M15 8a6.97 6.97 0 0 0-1.71-4.584l-9.874 9.875A7 7 0 0 0 15 8M2.71 12.584l9.874-9.875a7 7 0 0 0-9.874 9.874ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0"/>
    </svg>
    <h1>Couldn't find your search request!</h1>
  </div>

  <p id="txt">Looks like nothing is there...</p>

  <script>
    const suchDaten = {
      "projekte": "https://example.com/projekt",
      "spiel": "https://example.com/spiele",
      "about": "Das ist eine Infoseite über das Projekt.",
      "hilfe": "Hier findest du Hilfe zu deiner Anfrage.",
      "kontakt": "Mail an: kontakt@example.com"
    };

    window.onload = function () {
      const params = new URLSearchParams(window.location.search);
      const request = params.get("request");

      if (request) {
        const searchrequest = decodeURIComponent(request).toLowerCase();
        const antwort = suchDaten[searchrequest];

        if (antwort) {
          if (antwort.startsWith("http")) {
            document.getElementById("txt").innerHTML = `Gefunden: <a href="${antwort}" target="_blank">${antwort}</a>`;
          } else {
            document.getElementById("txt").innerText = `Antwort: ${antwort}`;
          }
        } else {
          document.getElementById("txt").innerText = `Search: ${searchrequest}`;
          document.getElementById("error").style.display = "block";
        }
      } else {
        document.getElementById("txt").innerText = "No search request provided.";
        document.getElementById("error").style.display = "block";
      }
    };
  </script>
</body>
</html>
