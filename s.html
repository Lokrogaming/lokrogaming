<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Search</title>
  <style>
    #error {
      display: none;
      color: red;
      text-align: center;
    }
    #results {
      margin-top: 20px;
      text-align: center;
    }
    .result-item {
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="topnav">
    <a href="index.html" class="active">Home</a>
    <a href="game-library.html">Games</a>
    <a href="projekte.html">Projekte</a>
    <a href="about.html" class="about">About</a>
  </div>

  <div id="error">
    <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="Red" class="bi bi-ban" viewBox="0 0 16 16">
      <path d="M15 8a6.97 6.97 0 0 0-1.71-4.584l-9.874 9.875A7 7 0 0 0 15 8M2.71 12.584l9.874-9.875a7 7 0 0 0-9.874 9.874ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0"/>
    </svg>
    <h1>Couldn't find your search request!</h1>
  </div>

  <p id="txt" style="text-align:center;">Looks like nothing is there...</p>
  <div id="results"></div>

  <script>
    const allowedCodes = [
      "1342", "2057", "3869", "4790", "5182",
      "6203", "7318", "8420", "9531", "0647",
      "1783", "2940", "3501", "4672", "5893",
      "6019", "7205", "8436", "9104", "3285"
    ];

    const code = sessionStorage.getItem("validationCode");

    if (!allowedCodes.includes(code)) {
      // Ungültiger Code → Umleitung
      alert("Ungültiger Zugriff. Du wirst zur Startseite weitergeleitet.");
      window.location.href = "index.html";
    }

    const suchDaten = {
      "discord": "https://dcs.lol/lokrogaming",
      "games": "https://lokrogaming.github.io/game-library.html",
      "about": "https://lokrogaming.github.io/about.html",
      "reufnr": "https://lokrogaming.github.io/reufnr",
      "black0815xx": "https://lokrogaming.github.io/black0815xx",
      "cookieclicker": "https://lokrogaming.github.io/cc/",
      "partner": "https://lokrogaming.github.io/partner.html",
    };

    function treffQuote(query, key) {
      let match = 0;
      const minLen = Math.min(query.length, key.length);
      for (let i = 0; i < minLen; i++) {
        if (query[i] === key[i]) match++;
      }
      return Math.round((match / key.length) * 100);
    }

    window.onload = function () {
      const params = new URLSearchParams(window.location.search);
      const request = params.get("request");

      if (request) {
        const searchrequest = decodeURIComponent(request).toLowerCase();
        document.getElementById("txt").innerText = `Suchbegriff: ${searchrequest}`;
        
        const resultContainer = document.getElementById("results");
        resultContainer.innerHTML = "";
        let foundAny = false;

        Object.entries(suchDaten).forEach(([key, value]) => {
          if (key.includes(searchrequest)) {
            foundAny = true;
            const quote = treffQuote(searchrequest, key);
            const item = document.createElement("div");
            item.className = "result-item";
            item.innerHTML = `🔎 <strong>${key}</strong> (${quote}% Trefferquote): <a href="${value}" target="_blank">${value}</a>`;
            resultContainer.appendChild(item);
          }
        });

        if (!foundAny) {
          document.getElementById("error").style.display = "block";
        }
      } else {
        document.getElementById("txt").innerText = "No search request provided.";
        document.getElementById("error").style.display = "block";
        setTimeout(back, 3000);
      }
    };

    function back() {
      history.back();
    }
  </script>
</body>
</html>
