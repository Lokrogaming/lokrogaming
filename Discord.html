<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Member Count</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .card { background: #f4f4f4; padding: 20px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h1>📊 Server-Mitglieder</h1>
    <div class="card">
        <p>👥 Gesamt: <span id="total">Lädt...</span></p>
        <p>🟢 Online: <span id="online">Lädt...</span></p>
        <p>⚫ Offline: <span id="offline">Lädt...</span></p>
    </div>
        <p>Online-Mitglieder: <span id="onlineMembers">Lade...</span></p>

<script>
  fetch('https://discord.com/api/guilds/1301611966657466399/widget.json')
    .then(res => res.json())
    .then(data => {
      const onlineCount = data.members.length;
      document.getElementById('onlineMembers').textContent = onlineCount;
    })
    .catch(err => {
      console.error("Fehler beim Laden der Discord-Daten:", err);
      document.getElementById('onlineMembers').textContent = 'Fehler';
    });
</script>


</body>
</html>
